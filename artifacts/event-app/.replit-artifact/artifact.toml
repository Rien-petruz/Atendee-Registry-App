kind = "web"
previewPath = "/"
title = "Event Attendee App"
version = "1.0.0"
id = "artifacts/event-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18244

[services.development]
run = "pnpm --filter @workspace/event-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/event-app", "run", "build" ]
publicDir = "artifacts/event-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18244"
BASE_PATH = "/"
