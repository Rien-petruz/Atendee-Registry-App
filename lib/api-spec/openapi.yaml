openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Event Attendee App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: attendees
    description: Attendee management operations
  - name: settings
    description: SMTP and SMS provider settings operations
  - name: email
    description: Email sending operations
  - name: sms
    description: SMS sending operations (KudiSMS)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current admin info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current admin user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/admins:
    get:
      operationId: listAdmins
      tags: [auth]
      summary: List all admin users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of admins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAdmin
      tags: [auth]
      summary: Create a new admin user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdminRequest"
      responses:
        "201":
          description: Admin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/admins/{id}:
    delete:
      operationId: deleteAdmin
      tags: [auth]
      summary: Delete an admin user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Admin deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAdminResponse"
        "400":
          description: Cannot delete (self or last admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /attendees:
    post:
      operationId: registerAttendee
      tags: [attendees]
      summary: Register a new attendee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterAttendeeRequest"
      responses:
        "201":
          description: New attendee registered and attendance recorded for the current month
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attendee"
        "200":
          description: Returning attendee — attendance recorded for the current month
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attendee"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getAttendees
      tags: [attendees]
      summary: Get attendees with filtering, sorting, pagination
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by name or email
        - name: filter
          in: query
          schema:
            type: string
            enum: [all, newcomers, returning]
          description: Filter attendees
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, oldest]
          description: Sort order
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Items per page
        - name: month
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: Filter by month (1-12)
        - name: year
          in: query
          schema:
            type: integer
          description: Filter by year (e.g. 2025)
      responses:
        "200":
          description: List of attendees
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendeesResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /attendees/admin:
    post:
      operationId: adminAddAttendee
      tags: [attendees]
      summary: Admin add attendee with optional backfilled month/year
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAddAttendeeRequest"
      responses:
        "200":
          description: Attendee added or attendance recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAddAttendeeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /attendees/import:
    post:
      operationId: importAttendees
      tags: [attendees]
      summary: Bulk import attendees with month/year per row
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportAttendeesRequest"
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportAttendeesResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /attendees/{id}:
    delete:
      operationId: deleteAttendee
      tags: [attendees]
      summary: Delete an attendee (cascades to attendances)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attendee deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAttendeeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /attendees/{id}/attendances:
    delete:
      operationId: deleteAttendance
      tags: [attendees]
      summary: Delete a single attendance for an attendee (specific month/year)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAttendanceRequest"
      responses:
        "200":
          description: Attendance deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAttendanceResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /attendees/export:
    get:
      operationId: exportAttendees
      tags: [attendees]
      summary: Export attendees as CSV
      security:
        - bearerAuth: []
      parameters:
        - name: filter
          in: query
          schema:
            type: string
            enum: [all, newcomers, returning]
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings/smtp:
    get:
      operationId: getSmtpSettings
      tags: [settings]
      summary: Get SMTP settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SMTP settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmtpSettings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: saveSmtpSettings
      tags: [settings]
      summary: Save SMTP settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SmtpSettingsRequest"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmtpSettings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings/smtp/test:
    post:
      operationId: testSmtpSettings
      tags: [settings]
      summary: Test SMTP connection
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings/sms:
    get:
      operationId: getSmsSettings
      tags: [settings]
      summary: Get SMS provider settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SMS settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsSettings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: saveSmsSettings
      tags: [settings]
      summary: Save SMS provider settings (KudiSMS token + sender ID)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SmsSettingsRequest"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsSettings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings/sms/send-test:
    post:
      operationId: sendTestSms
      tags: [settings]
      summary: Send a one-off test SMS and return the raw KudiSMS response for debugging
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendTestSmsRequest"
      responses:
        "200":
          description: Test SMS attempted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendTestSmsResponse"
        "400":
          description: Test failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings/sms/test:
    post:
      operationId: testSmsSettings
      tags: [settings]
      summary: Verify KudiSMS token and fetch current balance
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Test result with balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsTestResponse"
        "400":
          description: Not configured or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sms/send:
    post:
      operationId: sendSms
      tags: [sms]
      summary: Send bulk SMS to attendees via KudiSMS
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendSmsRequest"
      responses:
        "200":
          description: SMS send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendSmsResponse"
        "400":
          description: Bad request (no SMS configured, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sms/balance:
    get:
      operationId: getSmsBalance
      tags: [sms]
      summary: Get current KudiSMS wallet balance
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsBalanceResponse"
        "400":
          description: SMS provider not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream KudiSMS error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sms/history:
    get:
      operationId: getSmsHistory
      tags: [sms]
      summary: Get SMS campaign history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of sent SMS campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsCampaignsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /email/history:
    get:
      operationId: getEmailHistory
      tags: [email]
      summary: Get email campaign history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of sent campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailCampaignsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /email/send:
    post:
      operationId: sendEmail
      tags: [email]
      summary: Send bulk email to attendees
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEmailRequest"
      responses:
        "200":
          description: Email send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendEmailResponse"
        "400":
          description: Bad request (no SMTP configured, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        admin:
          $ref: "#/components/schemas/AdminUser"
      required:
        - token
        - admin

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - createdAt

    AdminsResponse:
      type: object
      properties:
        admins:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
      required:
        - admins

    CreateAdminRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - email
        - password

    DeleteAdminResponse:
      type: object
      properties:
        deleted:
          type: boolean
        admin:
          type: object
          properties:
            id:
              type: integer
            email:
              type: string
          required:
            - id
            - email
      required:
        - deleted
        - admin

    RegisterAttendeeRequest:
      type: object
      properties:
        fullName:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        phoneNumber:
          type: string
          minLength: 7
        isNewcomer:
          type: boolean
      required:
        - fullName
        - email
        - phoneNumber
        - isNewcomer

    Attendee:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        isNewcomer:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - fullName
        - email
        - phoneNumber
        - isNewcomer
        - createdAt

    AdminAddAttendeeRequest:
      type: object
      properties:
        fullName:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        phoneNumber:
          type: string
          minLength: 1
        isNewcomer:
          type: boolean
        month:
          type: integer
          minimum: 1
          maximum: 12
          description: Attendance month (1-12). Defaults to current month if omitted.
        year:
          type: integer
          minimum: 2000
          maximum: 2100
          description: Attendance year. Defaults to current year if omitted.
      required:
        - fullName
        - email
        - phoneNumber
        - isNewcomer

    AdminAddAttendeeResponse:
      type: object
      properties:
        attendee:
          $ref: "#/components/schemas/Attendee"
        created:
          type: boolean
          description: True if a new attendee row was inserted, false if an existing one was reused.
        attendanceAdded:
          type: boolean
          description: True if an attendance row was inserted, false if one already existed for (attendee, month, year).
      required:
        - attendee
        - created
        - attendanceAdded

    ImportAttendeeRow:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        isNewcomer:
          type: boolean
        month:
          type: integer
          minimum: 1
          maximum: 12
        year:
          type: integer
          minimum: 2000
          maximum: 2100
      required:
        - fullName
        - email
        - phoneNumber
        - isNewcomer
        - month
        - year

    ImportAttendeesRequest:
      type: object
      properties:
        rows:
          type: array
          maxItems: 5000
          items:
            $ref: "#/components/schemas/ImportAttendeeRow"
      required:
        - rows

    ImportError:
      type: object
      properties:
        rowNumber:
          type: integer
        message:
          type: string
      required:
        - rowNumber
        - message

    ImportAttendeesResponse:
      type: object
      properties:
        totalRows:
          type: integer
        createdAttendees:
          type: integer
        attendancesAdded:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ImportError"
      required:
        - totalRows
        - createdAttendees
        - attendancesAdded
        - skipped
        - errors

    DeleteAttendeeResponse:
      type: object
      properties:
        deleted:
          type: boolean
        attendee:
          $ref: "#/components/schemas/Attendee"
      required:
        - deleted
        - attendee

    DeleteAttendanceRequest:
      type: object
      properties:
        month:
          type: integer
          minimum: 1
          maximum: 12
        year:
          type: integer
          minimum: 2000
          maximum: 2100
      required:
        - month
        - year

    DeleteAttendanceResponse:
      type: object
      properties:
        deleted:
          type: boolean
        attendance:
          type: object
          properties:
            id:
              type: integer
            attendeeId:
              type: integer
            month:
              type: integer
            year:
              type: integer
          required:
            - id
            - attendeeId
            - month
            - year
      required:
        - deleted
        - attendance

    AttendeesResponse:
      type: object
      properties:
        attendees:
          type: array
          items:
            $ref: "#/components/schemas/Attendee"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - attendees
        - total
        - page
        - limit
        - totalPages

    SmtpSettings:
      type: object
      properties:
        host:
          type: string
        port:
          type: integer
        username:
          type: string
        encryption:
          type: string
          enum: [tls, ssl, none]
        isConfigured:
          type: boolean
      required:
        - host
        - port
        - username
        - encryption
        - isConfigured

    SmtpSettingsRequest:
      type: object
      properties:
        host:
          type: string
        port:
          type: integer
        username:
          type: string
          format: email
        password:
          type: string
        encryption:
          type: string
          enum: [tls, ssl, none]
      required:
        - host
        - port
        - username
        - password
        - encryption

    SendEmailRequest:
      type: object
      properties:
        subject:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
        targetGroup:
          type: string
          enum: [all, newcomers, returning]
        imageBase64:
          type: string
          description: Base64-encoded image to embed in the email body
        imageMimeType:
          type: string
          description: MIME type of the image (e.g. image/png, image/jpeg)
        filterMonth:
          type: integer
          minimum: 1
          maximum: 12
          description: Only send to attendees who registered in this month (1-12)
        filterYear:
          type: integer
          description: Only send to attendees who registered in this year
      required:
        - subject
        - message
        - targetGroup

    SmsSettings:
      type: object
      properties:
        provider:
          type: string
        senderId:
          type: string
        isConfigured:
          type: boolean
      required:
        - provider
        - senderId
        - isConfigured

    SmsSettingsRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 1
        senderId:
          type: string
          minLength: 1
          maxLength: 11
      required:
        - token
        - senderId

    SendTestSmsRequest:
      type: object
      properties:
        phone:
          type: string
        message:
          type: string
        route:
          type: string
          enum: [standard, corporate]
        senderIdOverride:
          type: string
      required:
        - phone

    SendTestSmsResponse:
      type: object
      properties:
        url:
          type: string
          description: The full URL we hit on KudiSMS (token redacted) so you can compare encoding
        normalizedPhone:
          type: string
          nullable: true
        raw:
          description: The verbatim JSON response from KudiSMS
      required:
        - url
        - raw

    SmsTestResponse:
      type: object
      properties:
        message:
          type: string
        balance:
          type: number
      required:
        - message
        - balance

    SendSmsRequest:
      type: object
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 1600
        targetGroup:
          type: string
          enum: [all, newcomers, returning]
        filterMonth:
          type: integer
          minimum: 1
          maximum: 12
        filterYear:
          type: integer
        phones:
          type: array
          items:
            type: string
          description: When provided, send only to these phone numbers (used for retrying failed sends). targetGroup is ignored.
        route:
          type: string
          enum: [standard, corporate]
          description: Which KudiSMS route to use. 'standard' is cheaper; 'corporate' bypasses DND restrictions but costs more. Defaults to standard.
      required:
        - message

    SmsSendError:
      type: object
      properties:
        phone:
          type: string
        reason:
          type: string
      required:
        - phone
        - reason

    SendSmsResponse:
      type: object
      properties:
        successCount:
          type: integer
        failedCount:
          type: integer
        total:
          type: integer
        message:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/SmsSendError"
      required:
        - successCount
        - failedCount
        - total
        - message
        - errors

    SmsBalanceResponse:
      type: object
      properties:
        balance:
          type: number
      required:
        - balance

    SmsCampaign:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
        targetGroup:
          type: string
        filterMonth:
          type: integer
          nullable: true
        filterYear:
          type: integer
          nullable: true
        successCount:
          type: integer
        failedCount:
          type: integer
        total:
          type: integer
        sentAt:
          type: string
          format: date-time
      required:
        - id
        - message
        - targetGroup
        - successCount
        - failedCount
        - total
        - sentAt

    SmsCampaignsResponse:
      type: object
      properties:
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/SmsCampaign"
      required:
        - campaigns

    EmailCampaign:
      type: object
      properties:
        id:
          type: integer
        subject:
          type: string
        targetGroup:
          type: string
        filterMonth:
          type: integer
          nullable: true
        filterYear:
          type: integer
          nullable: true
        successCount:
          type: integer
        failedCount:
          type: integer
        total:
          type: integer
        sentAt:
          type: string
          format: date-time
      required:
        - id
        - subject
        - targetGroup
        - successCount
        - failedCount
        - total
        - sentAt

    EmailCampaignsResponse:
      type: object
      properties:
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/EmailCampaign"
      required:
        - campaigns

    SendEmailResponse:
      type: object
      properties:
        successCount:
          type: integer
        failedCount:
          type: integer
        total:
          type: integer
        message:
          type: string
      required:
        - successCount
        - failedCount
        - total
        - message
